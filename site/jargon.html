    .glossary-card {

    .glossary-card:hover {

    .glossary-term {

      margin-bottom: 12px;
    }

    .glossary-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .glossary-col {
      flex: 1;
      min-width: 200px;
    }

    .glossary-col-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .glossary-col-says {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    .glossary-col-means {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* Inline Markdown rendered by mdInline(). See the script at the foot of this file. */
    .glossary-col-says strong,
    .glossary-col-means strong {
      font-weight: 700;
      color: var(--text);
    }

    /* The says column is already italic, so emphasis inside it reverts to roman. */
    .glossary-col-says em { font-style: normal; }
    .glossary-col-means em { font-style: italic; }

    .glossary-col-says code,
    .glossary-col-means code {
      font-family: var(--font-mono);
      font-size: 0.86em;

    @media (max-width: 768px) {

  <script>
    (function () {
      var root = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored) {
        root.setAttribute('data-theme', stored);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        root.setAttribute('data-theme', 'dark');
      } else {
        root.setAttribute('data-theme', 'light');
      }

      function updateIcon() {
        var icon = document.getElementById('themeIcon');
        if (!icon) return;
        /* The sun/moon icons are swapped by CSS based on the data-theme attribute. */
      }

      updateIcon();

      document.addEventListener('DOMContentLoaded', function () {
        updateIcon();

        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.addEventListener('click', function () {
            var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon();
          });
        }

        var searchInput = document.getElementById('glossarySearch');
        var listEl = document.getElementById('glossaryList');
        var countEl = document.getElementById('glossaryCount');

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        /**
         * Render the inline Markdown that terms.md uses: `code`, **bold**, *italic*.
         * Code spans are lifted out to placeholders first, so that asterisks inside
         * them stay literal AND emphasis that wraps a code span still matches
         * (e.g. "**always wait in a `while` loop**"). Everything is HTML-escaped
         * before a tag is inserted, so term text can never inject markup.
         */
        // U+0000 cannot occur in the source text, so a code-span placeholder can
        // never collide with real content such as "in 5 minutes".
        var SENT = '\u0000';
        var SENT_RE = /\u0000(\d+)\u0000/g;

        function mdInline(raw) {
          var codes = [];
          var text = ((raw == null) ? '' : String(raw)).replace(/`([^`]+)`/g, function (_, inner) {
            codes.push(inner);
            return SENT + (codes.length - 1) + SENT;
          });
          return escapeHtml(text)
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*]+)\*/g, '<em>$1</em>')
            .replace(SENT_RE, function (_, i) {
              return '<code>' + escapeHtml(codes[Number(i)]) + '</code>';
            });
        }

        function renderGlossary(filter) {
          var terms = GLOSSARY;
          if (filter) {
            var q = filter.toLowerCase();
            terms = terms.filter(function (t) {
              return t.term.toLowerCase().indexOf(q) !== -1 ||
                t.says.toLowerCase().indexOf(q) !== -1 ||
                t.means.toLowerCase().indexOf(q) !== -1;
            });
          }

          countEl.textContent = terms.length + ' of ' + GLOSSARY.length + ' terms';

          if (terms.length === 0) {
            listEl.innerHTML = '<div class="glossary-empty">No terms match your search.</div>';
            return;
          }

          var html = '';
          for (var i = 0; i < terms.length; i++) {
            var t = terms[i];
            html += '<div class="glossary-card">';
            html += '<div class="glossary-term">' + escapeHtml(t.term) + '</div>';
            html += '<div class="glossary-row">';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">What people say</div>';
            html += '<div class="glossary-col-says">"' + mdInline(t.says) + '"</div>';
            html += '</div>';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">What it actually means</div>';
            html += '<div class="glossary-col-means">' + mdInline(t.means) + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
          }
          listEl.innerHTML = html;
        }

        // Support ?q= deep-links from the command palette and external sources.
        // Pre-populate the search box and filter to the matching term so the
        // user lands directly on the definition rather than the full list.
        var urlQ = '';
        try { urlQ = new URLSearchParams(window.location.search).get('q') || ''; } catch (_) {}
        if (urlQ && searchInput) {
          searchInput.value = urlQ;
        }

        renderGlossary(urlQ);

        if (searchInput) {
          searchInput.addEventListener('input', function () {
            renderGlossary(searchInput.value.trim());
          });
        }
      });
    })();
  </script>

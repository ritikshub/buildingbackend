          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 6 280 192" width="560" height="384" fill="none" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="A fisherman sitting cross-legged in the shade beside a beached boat, hunched over a net, mending a hole in it.">
  <style>
    .note-fig-ink        { stroke: #e8e6dc; }
    .note-fig-net        { stroke: #6b8eff; }
    .note-fig-mesh-line  { stroke: #6b8eff; opacity: 0.5; }
    .note-fig-hole       { stroke: #6b8eff; fill: #0a0d1a; }
    .note-fig-hull       { fill: #0a0d1a; }
    .note-fig-sand       { stroke: #7a7878; }
    .note-fig-motion     { stroke: #6b8eff; opacity: 0.38; }
    .note-fig-shade-line { stroke: #7a7878; opacity: 0.28; }
  </style>
            <defs>
              <!-- Diamond lattice: the thing that actually reads as netting. -->
              <pattern id="netMesh" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <path class="note-fig-mesh-line" d="M0,0 V7 M0,0 H7" stroke-width="0.55"/>
              </pattern>
              <!-- Diagonal hatch: the shade, which is the whole point of the picture. -->
              <pattern id="shadeHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <path class="note-fig-shade-line" d="M0,0 V6" stroke-width="0.5"/>
              </pattern>
            </defs>

            <!-- boat, hauled up the beach and filled so it hides what sits behind the rim -->
            <g class="note-fig-ink" stroke-width="1.5">

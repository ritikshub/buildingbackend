              <path d="M64.8,136.8 Q58.2,139.9 54.1,137.4" stroke-width="1"/>
              <path d="M79,110.8 Q72,113.5 68.2,111.1" stroke-width="1"/>
              <path d="M97.2,86.6 Q89.9,88.6 86.7,86.1" stroke-width="1"/>
            </g>


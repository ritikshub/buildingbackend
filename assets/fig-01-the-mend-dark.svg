            </g>

            <!-- coconuts, bunched where the fronds leave the trunk -->
            <g class="note-fig-ink" stroke-width="1.1">
              <circle cx="109" cy="68" r="3"/>
              <circle cx="117" cy="69.5" r="3"/>
              <circle cx="113" cy="74.5" r="3"/>
              <circle cx="123" cy="67" r="3"/>
            </g>

            <!-- the net: lashed to the trunk, falling slack to pool on the sand -->
            <path class="note-fig-ink" d="M78,108 Q75,111 73,115" stroke-width="1.3"/>
            <path class="note-fig-net" d="M74,112 Q108,128 144,144 L152,174 Q116,180 80,170 Z"
                  stroke-width="1.4" fill="url(#netMesh)"/>

            <!-- the tear, stitched part-way shut and still open at the far end -->
            <path class="note-fig-hole" d="M146,158 Q138,150 130,155 Q138,165 146,158 Z" stroke-width="1.2"/>
            <path class="note-fig-net" d="M144,155 V162.5 M139,152.5 V164" stroke-width="1.1"/>
            <!-- the working thread, needle back to the tear -->
            <path class="note-fig-motion" d="M150,161 Q148,160 146,158" stroke-width="1.2" stroke-dasharray="3 3"/>

            <!-- fisherman, sitting cross-legged in the shade and hunched over the mend -->
            <g class="note-fig-ink" stroke-width="1.7">
              <circle cx="182" cy="139" r="7.5"/>
              <path d="M182,147 Q189,157 193,173"/>
              <!-- legs stretched out along the sand, feet flexed up -->
              <path d="M193,174 L164,179 L158,174"/>
              <path d="M192,177 L168,183 L162,178"/>
              <!-- one hand holds the net taut, the other drives the needle -->
              <path d="M182,149 L168,155 L148,151"/>
              <path d="M182,149 L176,163 L150,161"/>
            </g>
          </svg>
